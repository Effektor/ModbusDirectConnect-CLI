name: Release Please (Pre-release)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release_outputs.outputs.release_created }}
      tag_name: ${{ steps.release_outputs.outputs.tag_name }}
      version: ${{ steps.release_outputs.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select release-please token source
        id: token_source
        shell: bash
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "${RELEASE_PLEASE_TOKEN}" ]; then
            echo "use_pat=false" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_PLEASE_TOKEN not set. Using GITHUB_TOKEN." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          status_code="$(
            curl -sS -o /tmp/release_please_repo_check.json -w "%{http_code}" \
              -H "Authorization: Bearer ${RELEASE_PLEASE_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}"
          )"

          if [ "${status_code}" = "200" ]; then
            echo "use_pat=true" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_PLEASE_TOKEN has repository access. Using RELEASE_PLEASE_TOKEN." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "use_pat=false" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_PLEASE_TOKEN cannot access ${GITHUB_REPOSITORY} (HTTP ${status_code}). Falling back to GITHUB_TOKEN." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Run release-please (RELEASE_PLEASE_TOKEN)
        id: release_pat
        if: steps.token_source.outputs.use_pat == 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      - name: Run release-please (GITHUB_TOKEN)
        id: release_gh
        if: steps.token_source.outputs.use_pat != 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      - name: Resolve release outputs
        id: release_outputs
        shell: bash
        env:
          RP_CREATED_PAT: ${{ steps.release_pat.outputs.release_created }}
          RP_TAG_PAT: ${{ steps.release_pat.outputs.tag_name }}
          RP_VERSION_PAT: ${{ steps.release_pat.outputs.version }}
          RP_CREATED_GH: ${{ steps.release_gh.outputs.release_created }}
          RP_TAG_GH: ${{ steps.release_gh.outputs.tag_name }}
          RP_VERSION_GH: ${{ steps.release_gh.outputs.version }}
        run: |
          release_created="${RP_CREATED_PAT}"
          tag_name="${RP_TAG_PAT}"
          version="${RP_VERSION_PAT}"

          if [ -z "${release_created}" ]; then
            release_created="${RP_CREATED_GH}"
          fi
          if [ -z "${tag_name}" ]; then
            tag_name="${RP_TAG_GH}"
          fi
          if [ -z "${version}" ]; then
            version="${RP_VERSION_GH}"
          fi

          if [ -z "${release_created}" ]; then
            release_created="false"
          fi

          echo "release_created=${release_created}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create RC prerelease on merged release commits
        id: rc_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          if [ "${EVENT_NAME}" != "push" ]; then
            echo "rc_created=false" >> "${GITHUB_OUTPUT}"
            echo "Not a push event. Skipping rc release publish."
            exit 0
          fi

          before="$(jq -r '.before // empty' "${GITHUB_EVENT_PATH}")"
          after="$(jq -r '.after // empty' "${GITHUB_EVENT_PATH}")"
          if [ -z "${before}" ] || [ -z "${after}" ]; then
            echo "rc_created=false" >> "${GITHUB_OUTPUT}"
            echo "Could not read push range from event payload."
            exit 0
          fi

          release_line="$(git log --format='%H %s' "${before}..${after}" | grep -E '^[0-9a-f]{40} chore\(main\): release [0-9]+\.[0-9]+\.[0-9]+$' | tail -1 || true)"
          if [ -z "${release_line}" ]; then
            echo "rc_created=false" >> "${GITHUB_OUTPUT}"
            echo "No merged release commit detected in this push."
            exit 0
          fi

          source_sha="$(echo "${release_line}" | awk '{print $1}')"
          stable_version="$(echo "${release_line}" | sed -E 's/^[0-9a-f]{40} chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+)$/\1/')"
          if [ -z "${stable_version}" ]; then
            echo "rc_created=false" >> "${GITHUB_OUTPUT}"
            echo "Failed to parse release version from '${release_line}'."
            exit 1
          fi

          git fetch --tags --force

          max_rc=0
          while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            rc_num="${tag##*.}"
            if [[ "${rc_num}" =~ ^[0-9]+$ ]] && [ "${rc_num}" -gt "${max_rc}" ]; then
              max_rc="${rc_num}"
            fi
          done < <(git tag -l "v${stable_version}-rc.*")

          next_rc=$((max_rc + 1))
          rc_tag="v${stable_version}-rc.${next_rc}"
          rc_version="${stable_version}-rc.${next_rc}"

          if gh release view "${rc_tag}" >/dev/null 2>&1; then
            echo "RC release ${rc_tag} already exists; skipping creation."
            echo "rc_created=false" >> "${GITHUB_OUTPUT}"
            echo "rc_tag=${rc_tag}" >> "${GITHUB_OUTPUT}"
            echo "rc_version=${rc_version}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git ls-remote --tags origin "refs/tags/${rc_tag}" | grep -q .; then
            echo "Remote tag ${rc_tag} already exists; creating/updating prerelease entry."
          else
            git tag "${rc_tag}" "${source_sha}"
            git push origin "refs/tags/${rc_tag}"
          fi

          gh release create "${rc_tag}" \
            --target "${source_sha}" \
            --title "${rc_tag}" \
            --generate-notes \
            --prerelease

          echo "rc_created=true" >> "${GITHUB_OUTPUT}"
          echo "rc_tag=${rc_tag}" >> "${GITHUB_OUTPUT}"
          echo "rc_version=${rc_version}" >> "${GITHUB_OUTPUT}"

      - name: Summary
        shell: bash
        run: |
          echo "release_created=${{ steps.release_outputs.outputs.release_created }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "tag_name=${{ steps.release_outputs.outputs.tag_name }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "version=${{ steps.release_outputs.outputs.version }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "rc_created=${{ steps.rc_release.outputs.rc_created }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "rc_tag=${{ steps.rc_release.outputs.rc_tag }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "rc_version=${{ steps.rc_release.outputs.rc_version }}" >> "${GITHUB_STEP_SUMMARY}"
