name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_INSTALL_DIR: $RUNNER_TOOL_CACHE/dotnet
  DOTNET_ROOT: $RUNNER_TOOL_CACHE/dotnet
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

permissions:
  contents: write
  issues: write
  pull-requests: write


jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release_outputs.outputs.release_created }}
      tag_name: ${{ steps.release_outputs.outputs.tag_name }}
      version: ${{ steps.release_outputs.outputs.version }}
      stable_release: ${{ steps.release_channel.outputs.stable_release }}
    steps:       
      - name: Run release-please
        id: release_gh        
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ github.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve release outputs
        id: release_outputs
        shell: bash
        run: |
          release_created="${{ steps.release_gh.outputs.release_created }}"
          tag_name="${{ steps.release_gh.outputs.tag_name }}"
          version="${{ steps.release_gh.outputs.version }}"

          # Set default for release_created if empty
          if [ -z "${release_created}" ]; then
            release_created="false"
          fi

          # Output all values (tag_name and version can be empty if no release was created)
          echo "release_created=${release_created}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Determine release channel
        id: release_channel
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          release_created="${{ steps.release_outputs.outputs.release_created }}"
          tag_name="${{ steps.release_outputs.outputs.tag_name }}"
          version="${{ steps.release_outputs.outputs.version }}"
          stable_release="false"

          if [ "${release_created}" = "true" ] \
            && [[ "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            && [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_prerelease="$(gh release view "${tag_name}" --json isPrerelease --jq .isPrerelease 2>/dev/null || echo true)"
            is_draft="$(gh release view "${tag_name}" --json isDraft --jq .isDraft 2>/dev/null || echo true)"

            if [ "${is_prerelease}" = "false" ] && [ "${is_draft}" = "false" ]; then
              stable_release="true"
            fi
          fi

          echo "stable_release=${stable_release}" >> "${GITHUB_OUTPUT}"

  publish-cli:
    name: Publish CLI (${{ matrix.rid }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        include:
          - rid: linux-x64
            artifact_name: mbdc-linux-amd64
            linux_out_dir: out/linux-amd64
            deb_arch: amd64
            nfpm_config: packaging/nfpm.amd64.yaml
            binary_name: mbdc
          - rid: linux-arm64
            artifact_name: mbdc-linux-arm64
            linux_out_dir: out/linux-arm64
            deb_arch: arm64
            nfpm_config: packaging/nfpm.arm64.yaml
            binary_name: mbdc
          - rid: win-x64
            artifact_name: mbdc-windows-x64
            linux_out_dir: ""
            deb_arch: ""
            nfpm_config: ""
            binary_name: mbdc.exe
          - rid: osx-x64
            artifact_name: mbdc-macos-x64
            linux_out_dir: ""
            deb_arch: ""
            nfpm_config: ""
            binary_name: mbdc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/effektor/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.PKGFEED || github.token }}

      - name: Restore dependencies
        run: dotnet restore ModbusDirectConnect.CLI.sln

      - name: Publish framework-dependent single-file
        shell: bash
        run: |
          dotnet publish ModbusDirectConnect.CLI/ModbusDirectConnect.CLI.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained false \
            --output ./publish/${{ matrix.rid }} \
            -p:PublishSingleFile=true

      - name: Verify binary architecture signatures
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v file >/dev/null 2>&1; then
            echo "::error::The 'file' utility is required to validate binary architecture signatures."
            exit 1
          fi

          binary="./publish/${{ matrix.rid }}/${{ matrix.binary_name }}"
          if [ ! -f "${binary}" ]; then
            echo "::error::Expected binary not found: ${binary}"
            exit 1
          fi

          case "${{ matrix.rid }}" in
            linux-x64)
              expected_binary_pattern='ELF 64-bit.*x86-64'
              expected_native_pattern='ELF 64-bit.*x86-64'
              ;;
            linux-arm64)
              expected_binary_pattern='ELF 64-bit.*(ARM aarch64|aarch64)'
              expected_native_pattern='ELF 64-bit.*(ARM aarch64|aarch64)'
              ;;
            win-x64)
              expected_binary_pattern='PE32\+ executable.*x86-64'
              expected_native_pattern=''
              ;;
            osx-x64)
              expected_binary_pattern='Mach-O 64-bit.*x86_64'
              expected_native_pattern=''
              ;;
            *)
              echo "::error::No architecture signature check configured for RID '${{ matrix.rid }}'."
              exit 1
              ;;
          esac

          binary_signature="$(file -b "${binary}")"
          echo "Binary signature (${binary}): ${binary_signature}"
          if ! echo "${binary_signature}" | grep -Eiq "${expected_binary_pattern}"; then
            echo "::error::Binary signature mismatch for RID '${{ matrix.rid }}'. Expected pattern: ${expected_binary_pattern}"
            exit 1
          fi

          native_lib="./publish/${{ matrix.rid }}/libSystem.IO.Ports.Native.so"
          if [ -n "${expected_native_pattern}" ] && [ -f "${native_lib}" ]; then
            native_signature="$(file -b "${native_lib}")"
            echo "Native signature (${native_lib}): ${native_signature}"
            if ! echo "${native_signature}" | grep -Eiq "${expected_native_pattern}"; then
              echo "::error::Native library signature mismatch for RID '${{ matrix.rid }}'. Expected pattern: ${expected_native_pattern}"
              exit 1
            fi
          fi

      - name: Prepare Linux package input
        if: matrix.deb_arch != ''
        shell: bash
        run: |
          mkdir -p "${{ matrix.linux_out_dir }}"
          cp "./publish/${{ matrix.rid }}/${{ matrix.binary_name }}" "${{ matrix.linux_out_dir }}/mbdc"
          if [ -f "./publish/${{ matrix.rid }}/libSystem.IO.Ports.Native.so" ]; then
            cp "./publish/${{ matrix.rid }}/libSystem.IO.Ports.Native.so" "${{ matrix.linux_out_dir }}/"
          fi
          chmod +x "${{ matrix.linux_out_dir }}/mbdc"

      - name: Build Debian package
        if: matrix.deb_arch != ''
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install nfpm
        if: matrix.deb_arch != ''
        shell: bash
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Pack Debian package
        if: matrix.deb_arch != ''
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        shell: bash
        run: |
          mkdir -p ./deb
          nfpm pkg \
            --packager deb \
            --config "${{ matrix.nfpm_config }}" \
            --target "./deb/mbdc_${VERSION}_${{ matrix.deb_arch }}.deb"

      - name: Create artifact bundle
        shell: bash
        run: |
          mkdir -p ./artifact-bundle
          cp "./publish/${{ matrix.rid }}/${{ matrix.binary_name }}" ./artifact-bundle/
          if [ -f "./publish/${{ matrix.rid }}/libSystem.IO.Ports.Native.so" ]; then
            cp "./publish/${{ matrix.rid }}/libSystem.IO.Ports.Native.so" ./artifact-bundle/
          fi
          cp ./LICENSE ./artifact-bundle/
          cp ./README.md ./artifact-bundle/

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-bundle
          path: ./artifact-bundle/
          retention-days: 7

      - name: Upload deb package
        if: matrix.deb_arch != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-deb
          path: ./deb/*.deb
          retention-days: 7

  package-powershell-module:
    name: Package PowerShell Module
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create PowerShell module package
        run: |
          mkdir -p ./release-assets/ModbusDirectConnect
          cp -r ./PowerShell/* ./release-assets/ModbusDirectConnect/
          cp ./LICENSE ./release-assets/ModbusDirectConnect/
          cp ./README.md ./release-assets/ModbusDirectConnect/
          cd ./release-assets
          zip -r ../ModbusDirectConnect-PowerShell.zip ModbusDirectConnect

      - name: Upload PowerShell bundle
        uses: actions/upload-artifact@v4
        with:
          name: powershell-module-bundle
          path: ./ModbusDirectConnect-PowerShell.zip
          retention-days: 7

  upload-release-assets:
    name: Upload Release Assets
    needs: [release-please, publish-cli, package-powershell-module]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Create archives
        shell: bash
        run: |
          mkdir -p ./release-assets

          tar -czf ./release-assets/mbdc-linux-amd64.tar.gz -C ./downloaded-artifacts/mbdc-linux-amd64-bundle .
          tar -czf ./release-assets/mbdc-linux-arm64.tar.gz -C ./downloaded-artifacts/mbdc-linux-arm64-bundle .
          tar -czf ./release-assets/mbdc-macos-x64.tar.gz -C ./downloaded-artifacts/mbdc-macos-x64-bundle .

          pushd ./downloaded-artifacts/mbdc-windows-x64-bundle
          zip -r ../../release-assets/mbdc-windows-x64.zip .
          popd

          cp ./downloaded-artifacts/mbdc-linux-amd64-deb/*.deb ./release-assets/
          cp ./downloaded-artifacts/mbdc-linux-arm64-deb/*.deb ./release-assets/
          cp ./downloaded-artifacts/powershell-module-bundle/ModbusDirectConnect-PowerShell.zip ./release-assets/

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s nullglob
          deb_files=(./release-assets/*.deb)
          if [ ${#deb_files[@]} -eq 0 ]; then
            echo "No deb artifacts found in ./release-assets"
            exit 1
          fi

          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            --repo "${GH_REPO}" \
            ./release-assets/mbdc-linux-amd64.tar.gz \
            ./release-assets/mbdc-linux-arm64.tar.gz \
            ./release-assets/mbdc-windows-x64.zip \
            ./release-assets/mbdc-macos-x64.tar.gz \
            "${deb_files[@]}" \
            ./release-assets/ModbusDirectConnect-PowerShell.zip \
            --clobber

  publish-powershell-gallery:
    name: Publish PowerShell Module to PSGallery
    needs: [release-please, upload-release-assets]
    if: needs.release-please.outputs.stable_release == 'true' && vars.ENABLE_PSGALLERY_PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download PowerShell module asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          gh release download "${RELEASE_TAG}" \
            -p "ModbusDirectConnect-PowerShell.zip" \
            -D ./dist

      - name: Extract module package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./dist/module
          unzip -q ./dist/ModbusDirectConnect-PowerShell.zip -d ./dist/module
          test -f ./dist/module/ModbusDirectConnect/ModbusDirectConnect.psd1

      - name: Publish module to PSGallery
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            throw "PSGALLERY_API_KEY secret is required to publish to PSGallery."
          }

          if (-not (Get-Command Publish-Module -ErrorAction SilentlyContinue)) {
            Install-PackageProvider -Name NuGet -Scope CurrentUser -Force
            Install-Module PowerShellGet -Scope CurrentUser -Force -AllowClobber
            Import-Module PowerShellGet -Force
          }

          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          $modulePath = Join-Path $PWD 'dist/module/ModbusDirectConnect'
          $manifestPath = Join-Path $modulePath 'ModbusDirectConnect.psd1'
          $manifest = Import-PowerShellDataFile -Path $manifestPath
          $moduleVersion = $manifest.ModuleVersion.ToString()
          if ($moduleVersion -ne $env:RELEASE_VERSION) {
            throw "Module version mismatch. Manifest=$moduleVersion release=$($env:RELEASE_VERSION)"
          }

          Publish-Module -Path $modulePath -Repository PSGallery -NuGetApiKey $env:PSGALLERY_API_KEY

  publish-chocolatey:
    name: Publish Chocolatey Package
    needs: [release-please, upload-release-assets]
    if: needs.release-please.outputs.stable_release == 'true' && vars.ENABLE_CHOCOLATEY_PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CHOCO_API: ${{ secrets.CHOCO_API }}
    steps:
      - name: Validate Chocolatey API key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CHOCO_API}" ]; then
            echo "::error::CHOCO_API secret is required to publish to Chocolatey."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./dist
          gh release download "${RELEASE_TAG}" \
            -p "mbdc-windows-x64.zip" \
            -D ./dist

      - name: Setup NuGet CLI
        shell: bash
        run: |
          set -euo pipefail
          dotnet tool update --global NuGet.CommandLine --version 6.*
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Build Chocolatey package
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          zip_path="./dist/mbdc-windows-x64.zip"
          checksum="$(sha256sum "${zip_path}" | awk '{print tolower($1)}')"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/mbdc-windows-x64.zip"

          rm -rf ./choco
          cp -R ./packaging/chocolatey ./choco

          sed "s/{{VERSION}}/${RELEASE_VERSION}/g" \
            ./choco/mbdc.nuspec.template > ./choco/mbdc.nuspec
          rm ./choco/mbdc.nuspec.template

          sed \
            -e "s#{{URL64}}#${asset_url}#g" \
            -e "s#{{CHECKSUM64}}#${checksum}#g" \
            ./choco/tools/chocolateyinstall.ps1 > ./choco/tools/chocolateyinstall.ps1.rendered
          mv ./choco/tools/chocolateyinstall.ps1.rendered ./choco/tools/chocolateyinstall.ps1

          nuget pack ./choco/mbdc.nuspec -OutputDirectory ./choco

      - name: Push Chocolatey package
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          package="./choco/mbdc.${RELEASE_VERSION}.nupkg"
          test -f "${package}"
          nuget push "${package}" \
            -Source "https://push.chocolatey.org/" \
            -ApiKey "${CHOCO_API}" \
            -NonInteractive

  publish-deb-repo:
    name: Publish Debian Packages to Repo (Disabled)
    needs: [release-please, upload-release-assets]
    if: needs.release-please.outputs.stable_release == 'true' && vars.ENABLE_DEB_REPO_PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Placeholder
        shell: bash
        run: |
          echo "Debian package repository publishing is not configured yet."
          echo "This job is intentionally disabled by default."
          exit 1
