name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release_outputs.outputs.release_created }}
      tag_name: ${{ steps.release_outputs.outputs.tag_name }}
      version: ${{ steps.release_outputs.outputs.version }}
    steps:
      - name: Select release-please token source
        id: token_source
        shell: bash
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "${RELEASE_PLEASE_TOKEN}" ]; then
            echo "use_pat=false" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_PLEASE_TOKEN not set. Using GITHUB_TOKEN." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          status_code="$(
            curl -sS -o /tmp/release_please_repo_check.json -w "%{http_code}" \
              -H "Authorization: Bearer ${RELEASE_PLEASE_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}"
          )"

          if [ "${status_code}" = "200" ]; then
            echo "use_pat=true" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_PLEASE_TOKEN has repository access. Using RELEASE_PLEASE_TOKEN." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "use_pat=false" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_PLEASE_TOKEN cannot access ${GITHUB_REPOSITORY} (HTTP ${status_code}). Falling back to GITHUB_TOKEN." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Run release-please (RELEASE_PLEASE_TOKEN)
        id: release_pat
        if: steps.token_source.outputs.use_pat == 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Run release-please (GITHUB_TOKEN)
        id: release_gh
        if: steps.token_source.outputs.use_pat != 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve release outputs
        id: release_outputs
        shell: bash
        env:
          RP_CREATED_PAT: ${{ steps.release_pat.outputs.release_created }}
          RP_TAG_PAT: ${{ steps.release_pat.outputs.tag_name }}
          RP_VERSION_PAT: ${{ steps.release_pat.outputs.version }}
          RP_CREATED_GH: ${{ steps.release_gh.outputs.release_created }}
          RP_TAG_GH: ${{ steps.release_gh.outputs.tag_name }}
          RP_VERSION_GH: ${{ steps.release_gh.outputs.version }}
        run: |
          release_created="${RP_CREATED_PAT}"
          tag_name="${RP_TAG_PAT}"
          version="${RP_VERSION_PAT}"

          if [ -z "${release_created}" ]; then
            release_created="${RP_CREATED_GH}"
          fi
          if [ -z "${tag_name}" ]; then
            tag_name="${RP_TAG_GH}"
          fi
          if [ -z "${version}" ]; then
            version="${RP_VERSION_GH}"
          fi

          if [ -z "${release_created}" ]; then
            release_created="false"
          fi

          echo "release_created=${release_created}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  publish-cli:
    name: Publish CLI (${{ matrix.rid }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: mbdc-linux-amd64
            linux_out_dir: out/linux-amd64
            deb_arch: amd64
            nfpm_config: packaging/nfpm.amd64.yaml
            binary_name: mbdc
          - os: ubuntu-latest
            rid: linux-arm64
            artifact_name: mbdc-linux-arm64
            linux_out_dir: out/linux-arm64
            deb_arch: arm64
            nfpm_config: packaging/nfpm.arm64.yaml
            binary_name: mbdc
          - os: windows-latest
            rid: win-x64
            artifact_name: mbdc-windows-x64
            linux_out_dir: ""
            deb_arch: ""
            nfpm_config: ""
            binary_name: mbdc.exe
          - os: macos-latest
            rid: osx-x64
            artifact_name: mbdc-macos-x64
            linux_out_dir: ""
            deb_arch: ""
            nfpm_config: ""
            binary_name: mbdc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/effektor/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.PKGFEED || secrets.GITHUB_TOKEN }}

      - name: Restore dependencies
        run: dotnet restore ModbusDirectConnect.CLI.sln

      - name: Build
        run: dotnet build ModbusDirectConnect.CLI.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ModbusDirectConnect.CLI.sln --configuration Release --no-build --verbosity normal

      - name: Publish framework-dependent single-file
        shell: bash
        run: |
          dotnet publish ModbusDirectConnect.CLI/ModbusDirectConnect.CLI.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained false \
            --output ./publish/${{ matrix.rid }} \
            -p:PublishSingleFile=true

      - name: Prepare Linux package input
        if: matrix.deb_arch != ''
        shell: bash
        run: |
          mkdir -p "${{ matrix.linux_out_dir }}"
          cp "./publish/${{ matrix.rid }}/${{ matrix.binary_name }}" "${{ matrix.linux_out_dir }}/mbdc"
          chmod +x "${{ matrix.linux_out_dir }}/mbdc"

      - name: Build Debian package
        if: matrix.deb_arch != ''
        uses: goreleaser/nfpm-action@v1
        with:
          version: latest
          args: package --packager deb --config ${{ matrix.nfpm_config }} --target ./deb/mbdc_${{ needs.release-please.outputs.version }}_${{ matrix.deb_arch }}.deb
        env:
          VERSION: ${{ needs.release-please.outputs.version }}

      - name: Create artifact bundle
        shell: bash
        run: |
          mkdir -p ./artifact-bundle
          cp "./publish/${{ matrix.rid }}/${{ matrix.binary_name }}" ./artifact-bundle/
          cp ./LICENSE ./artifact-bundle/
          cp ./README.md ./artifact-bundle/

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-bundle
          path: ./artifact-bundle/
          retention-days: 7

      - name: Upload deb package
        if: matrix.deb_arch != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-deb
          path: ./deb/*.deb
          retention-days: 7

  package-powershell-module:
    name: Package PowerShell Module
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create PowerShell module package
        run: |
          mkdir -p ./release-assets/ModbusDirectConnect
          cp -r ./PowerShell/* ./release-assets/ModbusDirectConnect/
          cp ./LICENSE ./release-assets/ModbusDirectConnect/
          cp ./README.md ./release-assets/ModbusDirectConnect/
          cd ./release-assets
          zip -r ../ModbusDirectConnect-PowerShell.zip ModbusDirectConnect

      - name: Upload PowerShell bundle
        uses: actions/upload-artifact@v4
        with:
          name: powershell-module-bundle
          path: ./ModbusDirectConnect-PowerShell.zip
          retention-days: 7

  upload-release-assets:
    name: Upload Release Assets
    needs: [release-please, publish-cli, package-powershell-module]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Create archives
        shell: bash
        run: |
          mkdir -p ./release-assets

          tar -czf ./release-assets/mbdc-linux-amd64.tar.gz -C ./downloaded-artifacts/mbdc-linux-amd64-bundle .
          tar -czf ./release-assets/mbdc-linux-arm64.tar.gz -C ./downloaded-artifacts/mbdc-linux-arm64-bundle .
          tar -czf ./release-assets/mbdc-macos-x64.tar.gz -C ./downloaded-artifacts/mbdc-macos-x64-bundle .

          pushd ./downloaded-artifacts/mbdc-windows-x64-bundle
          zip -r ../../release-assets/mbdc-windows-x64.zip .
          popd

          cp ./downloaded-artifacts/mbdc-linux-amd64-deb/*.deb ./release-assets/
          cp ./downloaded-artifacts/mbdc-linux-arm64-deb/*.deb ./release-assets/
          cp ./downloaded-artifacts/powershell-module-bundle/ModbusDirectConnect-PowerShell.zip ./release-assets/

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s nullglob
          deb_files=(./release-assets/*.deb)
          if [ ${#deb_files[@]} -eq 0 ]; then
            echo "No deb artifacts found in ./release-assets"
            exit 1
          fi

          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            --repo "${GH_REPO}" \
            ./release-assets/mbdc-linux-amd64.tar.gz \
            ./release-assets/mbdc-linux-arm64.tar.gz \
            ./release-assets/mbdc-windows-x64.zip \
            ./release-assets/mbdc-macos-x64.tar.gz \
            "${deb_files[@]}" \
            ./release-assets/ModbusDirectConnect-PowerShell.zip \
            --clobber
