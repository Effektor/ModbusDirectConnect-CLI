name: Release Please (Pre-release)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release_outputs.outputs.release_created }}
      tag_name: ${{ steps.release_outputs.outputs.tag_name }}
      version: ${{ steps.release_outputs.outputs.version }}
    steps:
      - name: Select release-please token source
        id: token_source
        shell: bash
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "${RELEASE_PLEASE_TOKEN}" ]; then
            echo "use_pat=false" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_PLEASE_TOKEN not set. Using GITHUB_TOKEN." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          status_code="$(
            curl -sS -o /tmp/release_please_repo_check.json -w "%{http_code}" \
              -H "Authorization: Bearer ${RELEASE_PLEASE_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}"
          )"

          if [ "${status_code}" = "200" ]; then
            echo "use_pat=true" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_PLEASE_TOKEN has repository access. Using RELEASE_PLEASE_TOKEN." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "use_pat=false" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_PLEASE_TOKEN cannot access ${GITHUB_REPOSITORY} (HTTP ${status_code}). Falling back to GITHUB_TOKEN." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Run release-please (RELEASE_PLEASE_TOKEN)
        id: release_pat
        if: steps.token_source.outputs.use_pat == 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Run release-please (GITHUB_TOKEN)
        id: release_gh
        if: steps.token_source.outputs.use_pat != 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve release outputs
        id: release_outputs
        shell: bash
        env:
          RP_CREATED_PAT: ${{ steps.release_pat.outputs.release_created }}
          RP_TAG_PAT: ${{ steps.release_pat.outputs.tag_name }}
          RP_VERSION_PAT: ${{ steps.release_pat.outputs.version }}
          RP_CREATED_GH: ${{ steps.release_gh.outputs.release_created }}
          RP_TAG_GH: ${{ steps.release_gh.outputs.tag_name }}
          RP_VERSION_GH: ${{ steps.release_gh.outputs.version }}
        run: |
          release_created="${RP_CREATED_PAT}"
          tag_name="${RP_TAG_PAT}"
          version="${RP_VERSION_PAT}"

          if [ -z "${release_created}" ]; then
            release_created="${RP_CREATED_GH}"
          fi
          if [ -z "${tag_name}" ]; then
            tag_name="${RP_TAG_GH}"
          fi
          if [ -z "${version}" ]; then
            version="${RP_VERSION_GH}"
          fi

          if [ -z "${release_created}" ]; then
            release_created="false"
          fi

          echo "release_created=${release_created}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Summary
        shell: bash
        run: |
          echo "release_created=${{ steps.release_outputs.outputs.release_created }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "tag_name=${{ steps.release_outputs.outputs.tag_name }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "version=${{ steps.release_outputs.outputs.version }}" >> "${GITHUB_STEP_SUMMARY}"
