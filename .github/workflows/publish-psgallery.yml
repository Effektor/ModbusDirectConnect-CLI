name: Publish PSGallery (Scaffold)

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Stable Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Stable tag to publish (for example v2.3.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    if: ${{ vars.ENABLE_PSGALLERY_PUBLISH == 'true' && (github.event_name != 'release' || github.event.release.prerelease == false) && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            head_sha="${{ github.event.workflow_run.head_sha }}"
            tag="$(
              gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
                --jq ".[] | select((.prerelease | not) and (.draft | not) and (.target_commitish == \"${head_sha}\")) | .tag_name" \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | head -n 1
            )"
            if [ -z "${tag}" ]; then
              echo "No stable release found targeting commit ${head_sha}. Skipping publish."
              echo "skip_publish=true" >> "${GITHUB_OUTPUT}"
              echo "version=" >> "${GITHUB_OUTPUT}"
              echo "release_tag=" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          else
            tag="${{ inputs.release_tag }}"
          fi

          tag="${tag#v}"
          if ! [[ "${tag}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected stable semver tag (X.Y.Z)." >&2
            exit 1
          fi

          echo "skip_publish=false" >> "${GITHUB_OUTPUT}"
          echo "version=${tag}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=v${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.release.outputs.skip_publish != 'true'
        uses: actions/checkout@v4

      - name: Download PowerShell module asset
        if: steps.release.outputs.skip_publish != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p ./dist
          gh release download "${{ steps.release.outputs.release_tag }}" \
            -p "ModbusDirectConnect-PowerShell.zip" \
            -D ./dist

      - name: Publish to PSGallery (TODO)
        if: steps.release.outputs.skip_publish != 'true'
        shell: bash
        run: |
          echo "Scaffold only. Set ENABLE_PSGALLERY_PUBLISH=true and add secrets before enabling publish logic."
          echo "Target version: ${{ steps.release.outputs.version }}"
