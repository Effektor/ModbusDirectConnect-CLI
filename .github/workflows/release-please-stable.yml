name: Release Please (Stable PR to Release)

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please-stable:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select release-please token source
        id: token_source
        shell: bash
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "${RELEASE_PLEASE_TOKEN}" ]; then
            echo "use_pat=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          status_code="$(
            curl -sS -o /tmp/release_please_repo_check_stable.json -w "%{http_code}" \
              -H "Authorization: Bearer ${RELEASE_PLEASE_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}"
          )"

          if [ "${status_code}" = "200" ]; then
            echo "use_pat=true" >> "${GITHUB_OUTPUT}"
          else
            echo "use_pat=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run stable release-please (RELEASE_PLEASE_TOKEN)
        if: steps.token_source.outputs.use_pat == 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config-stable.json
          manifest-file: .release-please-manifest.json
          target-branch: Release
          skip-github-release: true

      - name: Run stable release-please (GITHUB_TOKEN)
        if: steps.token_source.outputs.use_pat != 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config-stable.json
          manifest-file: .release-please-manifest.json
          target-branch: Release
          skip-github-release: true
