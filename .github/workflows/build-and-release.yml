name: Build and Release

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: mbdc-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact_name: mbdc-windows-x64
          - os: macos-latest
            rid: osx-x64
            artifact_name: mbdc-macos-x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        source-url: https://nuget.pkg.github.com/effektor/index.json
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.PKGFEED || secrets.GITHUB_TOKEN }}

    - name: Restore dependencies
      run: dotnet restore ModbusDirectConnect.CLI.sln

    - name: Build
      run: dotnet build ModbusDirectConnect.CLI.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test ModbusDirectConnect.CLI.sln --configuration Release --no-build --verbosity normal

    - name: Publish framework-dependent single-file
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: bash
      run: |
        dotnet publish ModbusDirectConnect.CLI/ModbusDirectConnect.CLI.csproj \
          --configuration Release \
          --runtime ${{ matrix.rid }} \
          --self-contained false \
          --output ./publish/${{ matrix.rid }} \
          -p:PublishSingleFile=true

    - name: Create artifact directory
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: bash
      run: |
        mkdir -p ./artifacts
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp ./publish/${{ matrix.rid }}/mbdc.exe ./artifacts/
          cp ./LICENSE ./artifacts/
          cp ./README.md ./artifacts/
        else
          cp ./publish/${{ matrix.rid }}/mbdc ./artifacts/
          chmod +x ./artifacts/mbdc
          cp ./LICENSE ./artifacts/
          cp ./README.md ./artifacts/
        fi

    - name: Upload build artifacts
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ./artifacts/
        retention-days: 30

  build-powershell-module:
    name: Build PowerShell Module
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create PowerShell module package
      run: |
        mkdir -p ./ps-module-artifacts/ModbusDirectConnect
        cp -r ./PowerShell/* ./ps-module-artifacts/ModbusDirectConnect/
        cp ./LICENSE ./ps-module-artifacts/ModbusDirectConnect/
        cp ./README.md ./ps-module-artifacts/ModbusDirectConnect/

    - name: Upload PowerShell module artifact
      uses: actions/upload-artifact@v4
      with:
        name: powershell-module
        path: ./ps-module-artifacts/
        retention-days: 30
