name: Build and Test

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        source-url: https://nuget.pkg.github.com/effektor/index.json
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.PKGFEED || secrets.GITHUB_TOKEN }}

    - name: Restore dependencies
      run: dotnet restore ModbusDirectConnect.CLI.sln

    - name: Build
      run: dotnet build ModbusDirectConnect.CLI.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test ModbusDirectConnect.CLI.sln --configuration Release --no-build --verbosity normal
